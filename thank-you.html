<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Lune</title>
    <link
      rel="icon"
      type="image/png"
      href="images/favicon-dark.png"
      id="favicon"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="thank-you-page">
      <div class="thank-you-box">
        <div class="thank-you-icon">✓</div>

        <h1 class="thank-you-title">Order Received</h1>

        <p class="thank-you-text">
          Thank you for your order. We will contact you shortly to confirm the
          details and next steps.
        </p>

        <div class="thank-you-actions">
          <a href="index.html" class="btn-primary">Back to Shop</a>
          <a href="contact.html" class="thank-you-link">Contact Us</a>
        </div>

        <p class="thank-you-meta">
          A confirmation request has been sent successfully.
        </p>
      </div>
    </main>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
