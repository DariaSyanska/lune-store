<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Lune</title>
    <link
      rel="icon"
      type="image/png"
      href="images/favicon-dark.png"
      id="favicon"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="scrolled">
      <div class="header-container">
        <a href="index.html" class="header-logo">
          <img src="images/nav-bar-dark.png" class="logo-img logo-dark" />
          <img src="images/nav-bar.png" class="logo-img logo-light" />
        </a>

        <div class="header-actions">
          <a href="index.html" class="nav-link small-link"> Return to Shop </a>
        </div>
      </div>
    </header>

    <main class="page-offset">
      <!-- Checkout Section -->
      <section class="checkout-section container">
        <form
          class="checkout-layout"
          id="checkout-form"
          action="https://api.web3forms.com/submit"
          method="POST"
        >
          <!-- Web3Forms -->
          <input
            type="hidden"
            name="access_key"
            value="f772b28a-601c-49a6-9eb6-fadd9013642f"
          />
          <input type="hidden" name="subject" value="New Order from Lune" />
          <input type="hidden" name="from_name" value="Lune Checkout" />
          <input type="hidden" name="botcheck" />
          <input
            type="hidden"
            name="redirect"
            value="https://lune-store.netlify.app/thank-you.html"
          />

          <div class="checkout-forms">
            <h1 class="checkout-title">Checkout</h1>

            <div class="form-group">
              <h3>Contact Information</h3>

              <input
                type="email"
                name="email"
                placeholder="Email address"
                required
                class="lune-input"
              />

              <input
                type="tel"
                name="phone"
                placeholder="Phone number"
                required
                class="lune-input"
              />
            </div>

            <div class="form-group">
              <h3>Shipping Address</h3>

              <div class="input-row">
                <input
                  type="text"
                  name="first_name"
                  placeholder="First name"
                  required
                  class="lune-input"
                />
                <input
                  type="text"
                  name="last_name"
                  placeholder="Last name"
                  required
                  class="lune-input"
                />
              </div>

              <input
                type="text"
                name="address"
                placeholder="Address"
                required
                class="lune-input"
              />

              <div class="input-row">
                <input
                  type="text"
                  name="city"
                  placeholder="City"
                  required
                  class="lune-input"
                />
                <input
                  type="text"
                  name="zip"
                  placeholder="Postal code"
                  required
                  class="lune-input"
                />
              </div>
            </div>

            <input
              type="hidden"
              name="order_items"
              value="Silk Slip Dress (Ivory / S)"
            />
            <input type="hidden" name="total_price" value="€ 189.00" />

            <div class="form-group">
              <h3>Payment Method</h3>

              <div class="payment-options">
                <label class="payment-card active">
                  <input type="radio" name="payment" value="card" checked />
                  <span>Credit Card</span>
                </label>

                <label class="payment-card">
                  <input type="radio" name="payment" value="paypal" />
                  <span>PayPal</span>
                </label>
              </div>

              <p class="checkout-note">
                This is a demo checkout. We will contact you to confirm the
                order.
              </p>
            </div>
          </div>

          <aside class="checkout-summary">
            <div class="summary-box">
              <h3>Order Summary</h3>

              <div class="summary-item">
                <img src="images/silk-dress.jpg" />
                <div class="summary-info">
                  <p class="summary-name">Silk Slip Dress</p>
                  <p class="summary-variant">Ivory / S</p>
                </div>
                <p class="summary-price">€ 189</p>
              </div>

              <div class="summary-totals">
                <div class="total-row">
                  <span>Subtotal</span>
                  <span>€ 189.00</span>
                </div>
                <div class="total-row">
                  <span>Shipping</span>
                  <span>Free</span>
                </div>
                <div class="total-row grand-total">
                  <span>Total</span>
                  <span>€ 189.00</span>
                </div>
              </div>

              <button type="submit" class="btn-primary">Submit Order</button>
            </div>
          </aside>
        </form>
      </section>
    </main>
  </body>

  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="./js/script.js"></script>
</html>
