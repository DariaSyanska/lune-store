<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lune</title>
    <link
      rel="icon"
      type="image/png"
      href="images/favicon-dark.png"
      id="favicon"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="header-container">
        <a href="/" class="header-logo">
          <img
            src="images/nav-bar-dark.png"
            alt="Lune"
            class="logo-img logo-dark"
          />
          <img
            src="images/nav-bar.png"
            alt="Lune"
            class="logo-img logo-light"
          />
        </a>

        <nav class="header-nav">
          <ul class="nav-list">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li class="separator">/</li>
            <li><a href="catalog.html" class="nav-link">Shop</a></li>
            <li class="separator">/</li>
            <li><span class="current-page">Contact</span></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button
            class="theme-toggle"
            id="theme-toggle"
            aria-label="Toggle theme"
          >
            <svg
              class="icon-moon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg
              class="icon-sun"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="page-offset container">
      <!-- Contact Section -->
      <section class="contact-layout">
        <div class="contact-info">
          <span class="subtitle">Get in Touch</span>
          <h1>Contact Us</h1>

          <div class="general-section">
            <h4>General Inquiries</h4>
            <p>hello@lune-store.com</p>
          </div>

          <div class="general-section">
            <h4>Visit our Studio</h4>
            <p>Rue de Rivoli 75, Paris, France</p>
          </div>

          <div class="general-section">
            <h4>Working Hours</h4>
            <p>Mon — Fri: 10:00 - 19:00</p>
          </div>
        </div>

        <div class="contact-form-container">
          <form class="contact-form" id="contact-form">
            <div class="input-group">
              <input type="text" placeholder="Your Name" required />
            </div>
            <div class="input-group">
              <input type="email" placeholder="Email Address" required />
            </div>
            <div class="input-group">
              <textarea placeholder="Message" rows="4"></textarea>
            </div>
            <button type="submit" class="btn-primary">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer container">
      <div class="footer-content">
        <p>© <span id="year"></span> Lune Store. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="./js/script.js" defer></script>
  </body>
</html>
